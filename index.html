<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KisanMind — Region-Based Crop Suggestions</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-green-50 min-h-screen">

    <!-- Header -->
    <header class="bg-green-800 text-white py-4 px-6 shadow-lg">
        <div class="max-w-5xl mx-auto flex items-center justify-between gap-3 flex-wrap">
            <h1 class="text-2xl font-bold">🌾 <span data-i18n="hdr.title">KisanMind</span></h1>
            <div class="flex items-center gap-2 flex-wrap">
                <p class="text-green-200 text-sm hidden sm:block" data-i18n="hdr.tagline">Region-Based Crop Suggestions</p>
                <select id="langToggle" onchange="setVoiceLang(this.value)"
                        title="Language / भाषा"
                        class="bg-green-900 text-white text-sm rounded px-2 py-1 border border-green-700 cursor-pointer">
                    <option value="hi-IN">🗣️ हिंदी</option>
                    <option value="en-IN">🗣️ English</option>
                </select>
            </div>
        </div>
    </header>

    <div class="max-w-5xl mx-auto px-3 py-6 sm:px-6">

        <!-- Region-based crop suggestions (city / GPS → state advice) -->
        <div class="bg-white rounded-xl shadow p-4 sm:p-6">
            <h2 class="text-lg sm:text-xl font-bold text-green-700 mb-1">🗺️ <span data-i18n="region.title">Region-Based Crop Suggestions</span></h2>
            <p class="text-gray-500 text-sm mb-4" data-i18n="region.subtitle">Type your city (English or Hindi) or use GPS — get the soil type and best crops for your state.</p>

            <div class="grid grid-cols-1 sm:grid-cols-3 gap-3 items-end">
                <div class="sm:col-span-2">
                    <label class="text-sm text-gray-600" data-i18n="region.cityLabel">City / Town</label>
                    <input id="regionCity" type="text"
                        data-i18n-placeholder="region.cityPlaceholder"
                        placeholder="e.g. Indore / इंदौर"
                        class="w-full border border-gray-300 rounded-lg p-2 mt-1 text-sm focus:ring-2 focus:ring-green-400 focus:outline-none"
                        onkeydown="if(event.key==='Enter'){event.preventDefault();getRegionAdvice(event);}"/>
                </div>
                <div class="flex gap-2">
                    <button type="button" onclick="getRegionAdvice(event)"
                        class="flex-1 bg-green-600 text-white px-3 py-2 rounded-lg text-sm font-medium hover:bg-green-700"
                        data-i18n="region.getBtn">🌾 Get Region Advice</button>
                    <button type="button" onclick="getRegionAdviceByGPS(event)"
                        title="Use my location"
                        class="bg-white border border-green-600 text-green-700 px-3 py-2 rounded-lg text-sm hover:bg-green-50"
                        data-i18n="region.useLocation">📍 Use My Location</button>
                </div>
            </div>

            <p id="regionNote" class="text-xs text-gray-500 mt-2 hidden"></p>
            <div id="regionResult" class="mt-4 hidden"></div>
        </div>

    </div>

<script>
    const BASE_URL = "";

    // ─────────────────────────────────────────
    // Language / i18n
    // ─────────────────────────────────────────
    let voiceLang = "hi-IN";

    const I18N = {
        en: {
            "hdr.title":              "KisanMind",
            "hdr.tagline":            "Region-Based Crop Suggestions",
            "region.title":           "Region-Based Crop Suggestions",
            "region.subtitle":        "Type your city (English or Hindi) or use GPS — get the soil type and best crops for your state.",
            "region.cityLabel":       "City / Town",
            "region.cityPlaceholder": "e.g. Indore / इंदौर",
            "region.getBtn":          "🌾 Get Region Advice",
            "region.useLocation":     "📍 Use My Location",
            "region.fetching":        "⏳ Looking up region data...",
            "region.locating":        "📍 Detecting your location...",
            "region.cardLocation":    "📍 Location",
            "region.cardSoil":        "🌱 Soil Type",
            "region.cardKharif":      "🌾 Kharif (Monsoon) Crops",
            "region.cardRabi":        "🌿 Rabi (Winter) Crops",
            "region.cardZaid":        "🌻 Zaid (Summer) Crops",
            "region.cardAdvice":      "💡 Practical Advice",
            "region.none":            "—",
            "region.gpsManualFallback": "Couldn't read your location. Please enter your city manually.",
            "result.error":           "Error: ",
        },
        hi: {
            "hdr.title":              "किसानमाइंड",
            "hdr.tagline":            "क्षेत्र-आधारित फसल सुझाव",
            "region.title":           "क्षेत्र-आधारित फसल सुझाव",
            "region.subtitle":        "अपने शहर का नाम लिखें (हिंदी या English) या GPS दबाएँ — आपके राज्य के लिए मिट्टी और सबसे अच्छी फसलें देखें।",
            "region.cityLabel":       "शहर / कस्बा",
            "region.cityPlaceholder": "जैसे इंदौर / Indore",
            "region.getBtn":          "🌾 क्षेत्र की सलाह पाएँ",
            "region.useLocation":     "📍 मेरी लोकेशन से देखें",
            "region.fetching":        "⏳ क्षेत्र की जानकारी ली जा रही है...",
            "region.locating":        "📍 आपकी लोकेशन का पता लगाया जा रहा है...",
            "region.cardLocation":    "📍 स्थान",
            "region.cardSoil":        "🌱 मिट्टी का प्रकार",
            "region.cardKharif":      "🌾 खरीफ (बरसात) फसलें",
            "region.cardRabi":        "🌿 रबी (सर्दी) फसलें",
            "region.cardZaid":        "🌻 ज़ायद (गर्मी) फसलें",
            "region.cardAdvice":      "💡 व्यावहारिक सलाह",
            "region.none":            "—",
            "region.gpsManualFallback": "आपकी लोकेशन नहीं मिल पाई। कृपया अपना शहर हाथ से लिखें।",
            "result.error":           "त्रुटि: ",
        }
    };

    function getApiLang() {
        return (voiceLang || "hi-IN").startsWith("en") ? "en" : "hi";
    }

    function t(key) {
        const lang = getApiLang();
        return (I18N[lang] && I18N[lang][key]) || (I18N.hi[key]) || key;
    }

    function applyI18n() {
        document.querySelectorAll("[data-i18n]").forEach(el => {
            el.textContent = t(el.getAttribute("data-i18n"));
        });
        document.querySelectorAll("[data-i18n-placeholder]").forEach(el => {
            el.setAttribute("placeholder", t(el.getAttribute("data-i18n-placeholder")));
        });
    }

    function setVoiceLang(value) {
        voiceLang = value || "hi-IN";
        applyI18n();
    }

    // ─────────────────────────────────────────
    // Helpers
    // ─────────────────────────────────────────
    function escapeHtml(s) {
        return String(s == null ? "" : s)
            .replace(/&/g, "&amp;").replace(/</g, "&lt;")
            .replace(/>/g, "&gt;").replace(/"/g, "&quot;")
            .replace(/'/g, "&#039;");
    }

    function disableBtn(btn) {
        if (!btn) return;
        btn.disabled = true;
        btn.classList.add("opacity-60", "cursor-not-allowed");
    }
    function enableBtn(btn) {
        if (!btn) return;
        btn.disabled = false;
        btn.classList.remove("opacity-60", "cursor-not-allowed");
    }

    // ─────────────────────────────────────────
    // Region-Based Crop Suggestions
    // ─────────────────────────────────────────
    function showRegionNote(text, type = "info") {
        const el = document.getElementById("regionNote");
        if (!el) return;
        if (!text) { el.classList.add("hidden"); el.innerText = ""; return; }
        el.classList.remove("hidden");
        const colors = {
            info:  "text-gray-600 bg-gray-50",
            warn:  "text-yellow-700 bg-yellow-50",
            ok:    "text-green-700 bg-green-50",
            error: "text-red-700 bg-red-50"
        };
        el.className = `text-xs mt-2 mb-2 p-2 rounded ${colors[type] || colors.info}`;
        el.innerText = text;
    }

    function renderRegionResult(data) {
        const box = document.getElementById("regionResult");
        box.classList.remove("hidden");

        const listOrDash = (arr) =>
            (arr && arr.length)
                ? `<ul class="list-disc list-inside text-sm text-gray-800 space-y-0.5">
                       ${arr.map(c => `<li>${escapeHtml(c)}</li>`).join("")}
                   </ul>`
                : `<span class="text-gray-400 text-sm">${t("region.none")}</span>`;

        const card = (title, body, accent) => `
            <div class="rounded-lg border ${accent} p-3 bg-white">
                <div class="text-xs font-semibold text-gray-600 mb-1">${escapeHtml(title)}</div>
                <div>${body}</div>
            </div>`;

        box.innerHTML = `
            <div class="grid grid-cols-1 sm:grid-cols-2 gap-3">
                ${card(t("region.cardLocation"),
                       `<div class="text-base font-semibold text-green-800">${escapeHtml(data.location)}</div>`,
                       "border-green-200")}
                ${card(t("region.cardSoil"),
                       `<div class="text-base font-semibold text-amber-800">${escapeHtml(data.soil)}</div>`,
                       "border-amber-200")}
                ${card(t("region.cardKharif"), listOrDash(data.kharif), "border-green-200")}
                ${card(t("region.cardRabi"),   listOrDash(data.rabi),   "border-emerald-200")}
                ${card(t("region.cardZaid"),   listOrDash(data.zaid),   "border-yellow-200")}
                ${card(t("region.cardAdvice"),
                       `<div class="text-sm text-gray-800 leading-relaxed">${escapeHtml(data.advice)}</div>`,
                       "border-blue-200")}
            </div>
        `;
    }

    async function _fetchRegion(payload, btn) {
        if (btn) disableBtn(btn);
        showRegionNote(t("region.fetching"), "info");
        document.getElementById("regionResult").classList.add("hidden");
        try {
            const res = await fetch(`${BASE_URL}/api/region-soil`, {
                method: "POST",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify({...payload, language: getApiLang()})
            });
            const data = await res.json();
            if (!res.ok || !data.ok) {
                showRegionNote(data.error || `Server error ${res.status}`, "error");
                return;
            }
            showRegionNote(data.notice || "", data.notice ? "warn" : "info");
            if (!data.notice) showRegionNote("");
            renderRegionResult(data);
        } catch (e) {
            showRegionNote(t("result.error") + e.message, "error");
        } finally {
            if (btn) enableBtn(btn);
        }
    }

    async function getRegionAdvice(event) {
        if (event) { event.preventDefault(); event.stopPropagation(); }
        const city = document.getElementById("regionCity").value.trim();
        if (!city) {
            showRegionNote(t("region.cityPlaceholder"), "warn");
            document.getElementById("regionCity").focus();
            return;
        }
        const btn = (event && event.currentTarget && event.currentTarget.tagName === "BUTTON") ? event.currentTarget : null;
        await _fetchRegion({city}, btn);
    }

    function getRegionAdviceByGPS(event) {
        if (event) { event.preventDefault(); event.stopPropagation(); }
        const btn = (event && event.currentTarget) ? event.currentTarget : null;
        if (!navigator.geolocation) {
            showRegionNote(t("region.gpsManualFallback"), "info");
            return;
        }
        showRegionNote(t("region.locating"), "info");
        if (btn) disableBtn(btn);
        navigator.geolocation.getCurrentPosition(
            async (pos) => {
                if (btn) enableBtn(btn);
                await _fetchRegion({lat: pos.coords.latitude, lon: pos.coords.longitude}, btn);
            },
            (err) => {
                if (btn) enableBtn(btn);
                showRegionNote(t("region.gpsManualFallback"), "info");
            },
            { timeout: 10000, maximumAge: 60000 }
        );
    }

    document.addEventListener("DOMContentLoaded", () => {
        const sel = document.getElementById("langToggle");
        if (sel) sel.value = voiceLang;
        applyI18n();
    });
</script>

</body>
</html>
